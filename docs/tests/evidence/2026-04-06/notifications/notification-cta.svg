<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <style>
      .title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 600; fill: #fff; }
      .copy { font-family: 'Inter', sans-serif; font-size: 18px; fill: #cbd5f5; }
      .meta { font-family: 'Inter', sans-serif; font-size: 14px; fill: #94a3b8; }
      .pill { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.3em; fill: #fff; }
      .button { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; }
    </style>
  </defs>
  <rect x="30" y="30" width="840" height="300" rx="32" fill="url(#card)" stroke="#34d399" stroke-opacity="0.3" stroke-width="2" />
  <rect x="70" y="80" width="70" height="70" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" />
  <text x="96" y="122" font-size="32" text-anchor="middle">💸</text>
  <text class="title" x="160" y="95">Withdrawal approved</text>
  <rect x="340" y="70" width="110" height="28" rx="14" fill="rgba(255,255,255,0.12)" />
  <text class="pill" x="360" y="90">UNREAD</text>
  <text class="copy" x="160" y="140">£2,500 has been released to your bank.</text>
  <text class="meta" x="160" y="170">Mon, 6 Apr · 16:10</text>
  <rect x="520" y="215" width="150" height="48" rx="14" fill="#10b981" />
  <text class="button" x="595" y="245" text-anchor="middle" fill="#0f172a">View wallet</text>
  <rect x="690" y="215" width="150" height="48" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" />
  <text class="button" x="765" y="245" text-anchor="middle" fill="#e2e8f0">Mark read</text>
</svg>
